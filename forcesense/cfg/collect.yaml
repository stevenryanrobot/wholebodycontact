# Whole-Body Contact (Plan A) — data-collection overrides.
#
# Merged onto a *low-level* G1_gentle run's cfg by forcesense/collect/isaac.py.
# The low-level locomotion/tracking policy just keeps the robot upright while we
# push random whole-body links; it does NOT consume net_pull_force_priv, so
# expanding the force-body set here causes no policy input-dim conflict.
#
# Use a STIFF low-level policy (e.g. 3kp_stiff) for collection: a non-compliant
# controller fights the push, so the proprioceptive signal (joint torque /
# tracking error) is strong. A compliant controller would "give way" and wash
# the signal out.

# --- whole-body single-point random external force (this is the label source) ---
# net_pull already: picks ONE random candidate body per env, ramps a random-magnitude
# force in a random direction, holds, ramps down, rests, repeats. We just widen the
# candidate set to the whole body and allow full 3D directions.
command:
  external_force_mode: net_pull
  net_pull_apply_pattern:        # one link per body region -> clean per-region labels
    - "torso_link"               # 0  trunk / upper body
    - "pelvis"                   # 1  base
    - "left_shoulder_yaw_link"   # 2  L upper arm
    - "right_shoulder_yaw_link"  # 3  R upper arm
    - "left_elbow_link"          # 4  L forearm
    - "right_elbow_link"         # 5  R forearm
    - "left_wrist_roll_link"     # 6  L hand
    - "right_wrist_roll_link"    # 7  R hand
    - "left_knee_link"           # 8  L shank
    - "right_knee_link"          # 9  R shank
    - "left_ankle_roll_link"     # 10 L foot
    - "right_ankle_roll_link"    # 11 R foot
  net_pull_force_range: [10.0, 40.0]   # N; <5N sits in the proprioceptive dead-zone
  net_pull_xy_only: false              # full 3D push directions
  net_pull_ramp_up_range: [10, 30]
  net_pull_hold_range: [40, 100]
  net_pull_ramp_down_range: [10, 30]
  net_pull_rest_range: [20, 60]        # rest phase -> "no contact" negative samples

# --- observation groups appended for data collection ---
# Group keys end with "_" so helpers.make_env_policy excludes them from VecNorm
# (we keep raw values and normalize in the trainer) and from the in_keys warning.
# Each group is concatenated by the obs manager into ONE flat tensor in the td.
observation:
  wbc_input_:                                            # MLP input: proprioception only
    applied_torque: {}                                   # PD effort -> strongest external-force cue
    joint_pos_history: {history_steps: [0, 1, 2, 3, 4]}  # joint pos + implicit velocity
    applied_action: {}                                   # commanded joint target q_des (-> tracking error)
    root_ang_vel_history: {history_steps: [0, 1, 2, 3, 4]}       # IMU gyro
    projected_gravity_history: {history_steps: [0, 1, 2, 3, 4]}  # IMU tilt
    prev_actions: {steps: 3}                             # known self-input, to subtract
  wbc_label_:                                            # supervision target (sim ground truth)
    net_pull_force_priv: {}   # [point_b(3) | force_b/Fmax(3) | force_w/Fmax(3) | body_onehot(K) | phase(4) | timer(1) | mag(1)]
