name: Deploy web demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_demo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web_demo/package-lock.json

      - name: Install deps
        run: npm ci || npm install

      # Project page lives at /wholebodycontact/ — build with that base so the
      # MuJoCo WASM, ONNX models and G1 assets (all referenced via
      # import.meta.env.BASE_URL) resolve under the sub-path.
      - name: Build
        run: npx vite build --base=/wholebodycontact/

      - name: Configure Pages
        # Pages must be enabled once manually (Settings -> Pages -> Source:
        # "GitHub Actions"); the default Actions token can't create the site.
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web_demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
