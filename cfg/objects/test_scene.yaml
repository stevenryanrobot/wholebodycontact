# Test scene with various objects for manipulation
# Usage: python scripts/eval_manipulation.py --run_path xxx -p --objects cfg/objects/test_scene.yaml

objects:
  # Dynamic box in front of robot (can be pushed)
  - type: box_dynamic
    name: box_front
    pos: [0.5, 0.0, 0.15]
    size: [0.1, 0.1, 0.1]
    color: [0.8, 0.3, 0.2]
    mass: 0.5

  # Static box on the right (obstacle)
  - type: box_static
    name: box_right
    pos: [0.4, -0.3, 0.1]
    size: [0.15, 0.15, 0.2]
    color: [0.3, 0.5, 0.8]
