# Multiple boxes scene for pushing/stacking
# Usage: python scripts/eval_manipulation.py --run_path xxx -p --objects cfg/objects/boxes_scene.yaml

objects:
  # Row of dynamic boxes
  - type: box_dynamic
    name: box_1
    pos: [0.45, -0.15, 0.05]
    size: [0.08, 0.08, 0.08]
    color: [0.9, 0.3, 0.3]
    mass: 0.4

  - type: box_dynamic
    name: box_2
    pos: [0.45, 0.0, 0.05]
    size: [0.08, 0.08, 0.08]
    color: [0.3, 0.9, 0.3]
    mass: 0.4

  - type: box_dynamic
    name: box_3
    pos: [0.45, 0.15, 0.05]
    size: [0.08, 0.08, 0.08]
    color: [0.3, 0.3, 0.9]
    mass: 0.4

  # Larger static platform
  - type: box_static
    name: platform
    pos: [0.7, 0.0, 0.05]
    size: [0.3, 0.4, 0.1]
    color: [0.4, 0.4, 0.4]
