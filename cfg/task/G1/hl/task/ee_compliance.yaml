command:
  force_active_pattern:
    - ".*hand_mimic"
  net_pull_ee_compliance_stiffness: ${task.reward.ee_compliance.ee_force_compliance_tracking.stiffness}
  net_pull_ee_compliance_max_offset: ${task.reward.ee_compliance.ee_force_compliance_tracking.max_offset}
  net_pull_ee_compliance_force_deadband: ${task.reward.ee_compliance.ee_force_compliance_tracking.force_deadband}
  reward_sigma:
    feet: [0.2]

observation:
  hl_policy:
    root_and_wrist_6d: {enabled: false}
    root_and_wrist_6d_reference: {}
    ee_compliance_state:
      stiffness: ${task.reward.ee_compliance.ee_force_compliance_tracking.stiffness}
      max_offset: ${task.reward.ee_compliance.ee_force_compliance_tracking.max_offset}
      force_deadband: ${task.reward.ee_compliance.ee_force_compliance_tracking.force_deadband}
    prev_high_actions: {steps: 3}

reward:
  root_hold:
    root_position_hold: {weight: 0.0, sigma: 0.25, mode: xy, enabled: false}
    root_height_hold: {weight: 0.0, sigma: 0.08, target_height: 0.79, enabled: false}
  ee_compliance:
    ee_force_compliance_tracking:
      weight: 5.0
      stiffness: 200.0
      sigma: 0.10
      max_offset: 0.25
      force_deadband: 5.0
    ee_orientation_tracking:
      weight: 0.0
      sigma: [1.0, 0.5]
      enabled: false
