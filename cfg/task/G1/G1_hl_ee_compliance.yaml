name: G1HLEECOMPLIANCE

defaults:
  - /task/G1/G1_hl_root_hold@_here_
  - _self_

command:
  force_active_pattern:
    - ".*hand_mimic"
  reward_sigma:
    feet: [0.2]

action:
  command_dim: 12
  root_command:
    enabled: false
  ee_command:
    enabled: true
    pos_scale: [0.15, 0.15, 0.15]
    rot_scale: [0.5, 0.5, 0.5]

observation:
  hl_policy:
    root_and_wrist_6d: {enabled: false}
    root_and_wrist_6d_reference: {}

reward:
  root_hold:
    root_position_hold: {weight: 0.0, sigma: 0.25, mode: xy, enabled: false}
    root_height_hold: {weight: 0.0, sigma: 0.08, target_height: 0.79, enabled: false}
  ee_compliance:
    ee_force_compliance_tracking:
      weight: 5.0
      stiffness: 60.0
      sigma: 0.08
      max_offset: 0.25
      force_deadband: 2.0
