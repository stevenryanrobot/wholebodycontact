name: G1HLROOTHOLD

defaults:
  - /task/G1/G1_gentle@_here_
  - _self_

command:
  _target_: active_adaptation.envs.mdp.commands.motion_tracking.RootCommandMotionTrackingCommand_impedance
  nominal_root_height: 0.79
  student_train: True
  disable_motion_finish: True

action:
  _target_: active_adaptation.envs.mdp.action.HierarchicalRootCommand
  _recursive_: False
  command_dim: 5
  nominal_root_height: 0.79
  command_scale: [0.10, 0.3, 0.3, 0.3, 0.3]
  low_policy_command_slice: [1, 7]
  low_policy_obs_key: low_policy
  low_policy:
    checkpoint_path: null
    run_path: null
    checkpoint_iteration: null
    phase: adapt
    vecnorm: eval
    in_keys: [policy, priv, joint_target, priv_critic]
  low_action:
    _target_: active_adaptation.envs.mdp.action.JointPosition
    action_scaling:
      .*elbow_joint: 1.0
      .*shoulder.*: 1.0
      .*wrist.*: 1.0
      .*hip_roll.*: 0.25
      .*hip_yaw.*: 0.25
      .*hip_pitch.*: 0.5
      .*knee.*: 0.5
      .*waist.*: 0.25
      .*ankle.*: 0.5
    max_delay: 4
    alpha: [0.9, 0.9]
    alpha_wide: [0.8, 1.0]
    alpha_jit_scale: 0.025
    boot_protect: True

observation:
  # High-level policy observation. This mirrors the current gentle policy obs,
  # but lives in its own group so it is independent from the frozen low-level obs.
  hl_policy:
    boot_indicator_state: {}
    command: {}
    force_priv: {}
    root_and_wrist_6d: {}
    feet_pos_b: {}
    root_ang_vel_history:      {history_steps: [0], noise_std: 0.05}
    projected_gravity_history: {history_steps: [0], noise_std: 0.01}
    joint_pos_history:         {history_steps: [0, 1, 2, 3, 4], noise_std: 0.005}
    prev_actions:              {steps: 3}

  # Frozen low-level policy observation. Keep this matched to the checkpoint
  # used by task.action.low_policy.run_path/checkpoint_path.
  policy:
    boot_indicator_state: {}
    command: {}
    root_and_wrist_6d: {}
    root_ang_vel_history:      {history_steps: [0], noise_std: 0.05}
    projected_gravity_history: {history_steps: [0], noise_std: 0.01}
    joint_pos_history:         {history_steps: [0, 1, 2, 3, 4], noise_std: 0.005}
    prev_actions:              {steps: 3}

  low_policy:
    boot_indicator_state: {}
    command: {}
    root_and_wrist_6d: {}
    root_ang_vel_history:      {history_steps: [0], noise_std: 0.05}
    projected_gravity_history: {history_steps: [0], noise_std: 0.01}
    joint_pos_history:         {history_steps: [0, 1, 2, 3, 4], noise_std: 0.005}
    prev_actions:              {steps: 3}

reward:
  impedance:
    force_reward: {weight: 0.0}
    force_exd_penalty: {weight: 0.0}
    force_target_tracking: {weight: 0.0}
    force_target_vel_tracking: {weight: 0.0}
    keypoint_tracking_imp: {weight: 0.0}
    lower_keypoint_tracking: {weight: 0.0}
  tracking:
    root_pos_tracking: {weight: 0.0}
    root_rot_tracking: {weight: 0.0}
    root_vel_tracking: {weight: 0.0}
    root_ang_vel_tracking: {weight: 0.0}
    joint_pos_tracking: {weight: 0.0}
    joint_vel_tracking: {weight: 0.0}
    ee_tracking: {weight: 0.0}
    feet_tracking: {weight: 0.0}
  loco:
    survival:           {weight: 5.0, enabled: true}
    impact_force_l2:    {weight: 4.0, enabled: true, body_names: .*ankle_roll_link}
    feet_slip:          {weight: 2.0, enabled: true, body_names: .*ankle_roll_link}
    joint_vel_l2:       {weight: 5.0e-4, enabled: true, joint_names: .*}
    action_rate_l2:     {weight: 0.2, enabled: true} # 0.1
    feet_air_time_ref:      {weight: 0.0, enabled: false, body_names: [left_ankle_roll_link, right_ankle_roll_link], thres: 0.8}
    joint_pos_limits:   {weight: 1.0, joint_names: ".*", soft_factor: 0.9, enabled: true}
    feet_contact_count: {weight: 0.0, enabled: false, body_names: .*ankle_roll_link, }

  root_hold:
    root_position_hold: {weight: 5.0, sigma: 0.25, mode: xy}
    root_height_hold: {weight: 3.0, sigma: 0.08, target_height: 0.79}
  regularization:
    high_action_l2: {weight: 0.02}
    high_action_rate_l2: {weight: 0.10}

termination:
  cum_error: {enabled: false}
  fall_over: {xy_thres: 0.8, z_thres: 0.5}
  root_height_below: {min_height: 0.55}
